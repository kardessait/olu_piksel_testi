<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ölü Piksel Testi</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
            background-color: black; /* Başlangıç rengi */
            color: white;
            font-family: sans-serif;
            overflow: hidden;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            pointer-events: none; /* Tıklamayı engellemez */
        }
    </style>
</head>
<body onclick="reportPixel(event)">

    <div id="info">
        <b>Klavye Kontrolleri:</b><br>
        1: Beyaz | 2: Siyah | 3: Kırmızı | 4: Yeşil | 5: Mavi <br>
        F: Tam Ekran | Tıklama: Piksel Raporla
    </div>

    <script>
        // Arka plan rengini değiştirme
        document.addEventListener('keydown', (e) => {
            const colors = {
                '1': 'white', '2': 'black', '3': 'red', 
                '4': 'green', '5': 'blue'
            };
            if (colors[e.key]) {
                document.body.style.backgroundColor = colors[e.key];
            }
            if (e.key.toLowerCase() === 'f') {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else {
                    document.exitFullscreen();
                }
            }
        });

        // Koordinatları backend'e gönderme
        function reportPixel(event) {
            const data = {
                x: event.clientX,
                y: event.clientY,
                color: document.body.style.backgroundColor || 'black'
            };

            fetch('/report', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(res => console.log("Sunucu Mesajı:", res.message));
        }
    </script>
</body>
</html>
